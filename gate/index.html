<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Vision Gate — Gate Station</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;overflow-x:hidden}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06)}
.topbar-left{display:flex;align-items:center;gap:8px}
.logo{width:30px;height:30px;background:linear-gradient(135deg,#00c878,#00a060);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.topbar-title{font-size:14px;font-weight:700}
.topbar-sub{font-size:10px;color:rgba(255,255,255,0.35)}
.clock-badge{font-size:12px;color:rgba(255,255,255,0.4);font-family:monospace}

/* GATE TOGGLE */
.gate-toggle{display:flex;margin:12px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.08)}
.gate-btn{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s}
.gate-btn.entry{background:rgba(0,200,120,0.06);color:rgba(0,200,120,0.5)}
.gate-btn.entry.active{background:linear-gradient(135deg,#00c878,#00a060);color:#fff}
.gate-btn.exit{background:rgba(255,80,80,0.06);color:rgba(255,80,80,0.4)}
.gate-btn.exit.active{background:linear-gradient(135deg,#ff5050,#cc0000);color:#fff}

/* CAMERA */
.camera-wrap{margin:0 12px;border-radius:14px;overflow:hidden;position:relative;background:#000;aspect-ratio:16/9}
video{width:100%;height:100%;object-fit:cover}
canvas{display:none}
.cam-overlay{position:absolute;inset:0;pointer-events:none}

/* Scan box */
.scan-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70%;height:50%;border:2px solid rgba(0,200,120,0.5);border-radius:6px}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,#00c878,transparent);animation:scan 2s linear infinite}
@keyframes scan{0%{top:0}100%{top:100%}}
.corner{position:absolute;width:14px;height:14px}
.corner.tl{top:-1px;left:-1px;border-top:3px solid #00c878;border-left:3px solid #00c878}
.corner.tr{top:-1px;right:-1px;border-top:3px solid #00c878;border-right:3px solid #00c878}
.corner.bl{bottom:-1px;left:-1px;border-bottom:3px solid #00c878;border-left:3px solid #00c878}
.corner.br{bottom:-1px;right:-1px;border-bottom:3px solid #00c878;border-right:3px solid #00c878}

/* Status bar on camera */
.cam-statusbar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.cam-dot-wrap{display:flex;align-items:center;gap:6px;font-size:11px}
.cam-dot{width:8px;height:8px;border-radius:50%;background:#888}
.cam-dot.live{background:#00c878;animation:blink 1s infinite}
.cam-dot.scanning{background:#ffa000;animation:blink 0.3s infinite}
.cam-dot.detected{background:#ff5050}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.motion-bar-wrap{display:flex;align-items:center;gap:6px;font-size:10px;color:rgba(255,255,255,0.5)}
.motion-bar{width:60px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.motion-fill{height:100%;background:#00c878;transition:width 0.15s;width:0%}

/* AUTO SWITCH ROW */
.auto-row{display:flex;align-items:center;justify-content:space-between;margin:10px 12px;padding:10px 14px;background:rgba(0,200,120,0.06);border:1px solid rgba(0,200,120,0.15);border-radius:12px}
.auto-label{font-size:13px;font-weight:600;color:#00c878}
.auto-sub{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px}
.toggle-sw{width:44px;height:24px;background:rgba(255,255,255,0.1);border-radius:12px;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle-sw.on{background:#00c878}
.toggle-sw::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left 0.2s}
.toggle-sw.on::after{left:23px}

/* SENSITIVITY ROW */
.sens-row{display:flex;align-items:center;gap:10px;margin:6px 12px;font-size:11px;color:rgba(255,255,255,0.4)}
.sens-row input{flex:1;accent-color:#00c878}
.sens-val{min-width:20px;text-align:right;color:#00c878;font-weight:700}

/* MANUAL TABS */
.mode-tabs{display:flex;gap:6px;padding:8px 12px}
.mode-tab{flex:1;padding:9px;border-radius:8px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02);font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);cursor:pointer;text-align:center;transition:all 0.2s}
.mode-tab.active{background:rgba(0,200,120,0.1);border-color:rgba(0,200,120,0.25);color:#00c878}

/* ACTION ROW */
.action-row{display:flex;gap:8px;margin:0 12px 10px}
.btn-capture{flex:2;padding:14px;background:linear-gradient(135deg,#00c878,#00a060);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.btn-capture:disabled{opacity:0.35;cursor:not-allowed}
.btn-sm2{flex:1;padding:14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;cursor:pointer}
.btn-pin{flex:1;padding:14px;background:rgba(255,160,0,0.08);border:1px solid rgba(255,160,0,0.2);border-radius:10px;color:#ffa000;font-size:12px;font-weight:600;cursor:pointer}
input[type=file]{display:none}

/* MANUAL INPUT */
.manual-wrap{margin:0 12px 10px;display:none}
.manual-wrap.show{display:flex;gap:8px}
.manual-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 14px;font-size:15px;color:#fff;outline:none;font-family:monospace;letter-spacing:1px}
.manual-input:focus{border-color:rgba(0,200,120,0.4)}
.manual-input::placeholder{color:rgba(255,255,255,0.18);letter-spacing:0}
.btn-go{padding:12px 18px;background:linear-gradient(135deg,#00c878,#00a060);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}

/* RESULT */
.result-panel{margin:0 12px 10px;border-radius:14px;overflow:hidden;display:none}
.result-panel.show{display:block}
.status-card{padding:16px;border-radius:14px;border:1px solid}
.status-card.resident{background:rgba(0,200,120,0.07);border-color:rgba(0,200,120,0.2)}
.status-card.visitor{background:rgba(255,160,0,0.07);border-color:rgba(255,160,0,0.2)}
.status-card.unknown{background:rgba(255,80,80,0.07);border-color:rgba(255,80,80,0.2)}
.status-card.waiting{background:rgba(100,100,255,0.07);border-color:rgba(100,100,255,0.2)}

.s-icon{font-size:28px;margin-bottom:6px}
.s-title{font-size:17px;font-weight:700;margin-bottom:3px}
.s-sub{font-size:12px;color:rgba(255,255,255,0.45)}
.plate-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;text-align:center;margin:10px 0}
.plate-txt{font-size:22px;font-weight:800;letter-spacing:2px;font-family:monospace}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.info-item{background:rgba(255,255,255,0.03);border-radius:6px;padding:8px}
.info-lbl{font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.info-val{font-size:13px;font-weight:600}
.action-btns{display:flex;gap:6px;margin-top:10px}
.btn-open{flex:1;padding:12px;background:linear-gradient(135deg,#00c878,#00a060);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.btn-deny{flex:1;padding:12px;background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.25);border-radius:8px;color:#ff5050;font-size:13px;font-weight:700;cursor:pointer}
.btn-scan-id{width:100%;padding:12px;background:rgba(255,160,0,0.1);border:1px solid rgba(255,160,0,0.25);border-radius:8px;color:#ffa000;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
.cd-wrap{text-align:center;padding:12px}
.cd-num{font-size:44px;font-weight:800;color:#00c878}
.cd-lbl{font-size:12px;color:rgba(255,255,255,0.35);margin-top:2px}
.thumb{width:100%;border-radius:8px;margin-bottom:10px;max-height:160px;object-fit:cover}

/* LOG */
.log-strip{margin:0 12px 12px;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px}
.log-title{font-size:10px;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.log-item{font-size:11px;color:rgba(255,255,255,0.45);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;gap:8px}
.log-item:last-child{border:none}
.log-plate{color:#fff;font-weight:600;font-family:monospace;font-size:12px}
.log-ok{color:#00c878}.log-warn{color:#ffa000}.log-err{color:#ff5050}

/* PIN PAD */
.pin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;align-items:center;justify-content:center}
.pin-overlay.show{display:flex}
.pin-modal{background:#141828;border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:24px;width:calc(100% - 32px);max-width:340px}
.pin-title{text-align:center;font-size:17px;font-weight:700;margin-bottom:16px}
.pin-display{background:rgba(255,255,255,0.04);border-radius:8px;padding:12px;text-align:center;font-size:26px;font-weight:700;letter-spacing:8px;margin-bottom:14px;min-height:52px}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:10px;font-size:19px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.15s}
.pin-key:active{background:rgba(0,200,120,0.2);transform:scale(0.95)}
.pin-key.del{color:#ff5050}.pin-key.ok{background:rgba(0,200,120,0.12);color:#00c878}
.pin-cancel{width:100%;margin-top:10px;padding:11px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer}

/* LOADING */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.loading-overlay.show{display:flex}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,0.08);border-top-color:#00c878;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:14px;color:rgba(255,255,255,0.55)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2035;border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 18px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}

/* AUTO STATUS BADGE */
.auto-status{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.65);border-radius:8px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:0.5px}
.auto-status.on{color:#00c878;border:1px solid rgba(0,200,120,0.3)}
.auto-status.off{color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.1)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">🛡️</div>
    <div>
      <div class="topbar-title">Gate Station</div>
      <div class="topbar-sub" id="guard-name">Guard</div>
    </div>
  </div>
  <div class="clock-badge" id="clock">--:--:--</div>
</div>

<div class="gate-toggle">
  <button class="gate-btn entry active" onclick="setGate('entry')">🔵 ขาเข้า ENTRY</button>
  <button class="gate-btn exit" onclick="setGate('exit')">🔴 ขาออก EXIT</button>
</div>

<!-- CAMERA -->
<div class="camera-wrap" id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas-hidden" style="display:none"></canvas>
  <canvas id="canvas-motion" style="display:none"></canvas>
  <div class="cam-overlay">
    <div class="scan-box">
      <div class="scan-line"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
  </div>
  <div class="auto-status off" id="auto-badge">AUTO OFF</div>
  <div class="cam-statusbar">
    <div class="cam-dot-wrap">
      <div class="cam-dot" id="cam-dot"></div>
      <span id="cam-status">กำลังเริ่มกล้อง...</span>
    </div>
    <div class="motion-bar-wrap">
      <span>Motion</span>
      <div class="motion-bar"><div class="motion-fill" id="motion-fill"></div></div>
      <span id="motion-pct">0%</span>
    </div>
  </div>
</div>

<!-- AUTO TOGGLE -->
<div class="auto-row">
  <div>
    <div class="auto-label">🤖 Auto-Scan Mode</div>
    <div class="auto-sub">ตรวจจับรถอัตโนมัติ — ไม่ต้องกดปุ่ม</div>
  </div>
  <div class="toggle-sw" id="auto-toggle" onclick="toggleAuto()"></div>
</div>

<!-- SENSITIVITY -->
<div class="sens-row" id="sens-row" style="display:none">
  <span>ความไว:</span>
  <input type="range" id="sens-slider" min="1" max="10" value="4" oninput="updateSens(this.value)">
  <span class="sens-val" id="sens-val">4</span>
  <span>| Cooldown:</span>
  <input type="range" id="cooldown-slider" min="3" max="30" value="10" oninput="updateCooldown(this.value)">
  <span class="sens-val" id="cooldown-val">10s</span>
</div>

<!-- MODE TABS -->
<div class="mode-tabs">
  <div class="mode-tab active" id="tab-camera" onclick="setMode('camera')">📷 กล้อง</div>
  <div class="mode-tab" id="tab-manual" onclick="setMode('manual')">⌨️ พิมพ์</div>
  <div class="mode-tab" id="tab-active" onclick="setMode('active')">🚗 ในหมู่บ้าน</div>
</div>

<!-- MANUAL INPUT -->
<div class="manual-wrap" id="manual-wrap">
  <input class="manual-input" id="manual-plate" type="text" placeholder="เช่น กษ 1234 ขอนแก่น" autocomplete="off">
  <button class="btn-go" onclick="manualCheck()">ตรวจ</button>
</div>

<!-- ACTION ROW -->
<div class="action-row" id="action-row">
  <button class="btn-capture" id="btn-capture" onclick="captureAndScan()">📷 ถ่ายภาพ &amp; สแกน</button>
  <input type="file" id="file-upload" accept="image/*" onchange="uploadScan(this)">
  <button class="btn-sm2" onclick="document.getElementById('file-upload').click()">🖼️</button>
  <button class="btn-pin" onclick="showPinPad()">🔢 PIN</button>
</div>

<!-- RESULT -->
<div class="result-panel" id="result-panel"></div>

<!-- LOG -->
<div class="log-strip">
  <div class="log-title">บันทึกวันนี้</div>
  <div id="log-list"><div style="font-size:11px;color:rgba(255,255,255,0.2);text-align:center;padding:6px">ยังไม่มีบันทึก</div></div>
</div>

<!-- PIN PAD -->
<div class="pin-overlay" id="pin-overlay">
  <div class="pin-modal">
    <div class="pin-title">🔢 ป้อน PIN ประจำบ้าน</div>
    <div class="pin-display" id="pin-display">_ _ _ _</div>
    <div class="pin-grid">
      <div class="pin-key" onclick="pinKey('1')">1</div><div class="pin-key" onclick="pinKey('2')">2</div><div class="pin-key" onclick="pinKey('3')">3</div>
      <div class="pin-key" onclick="pinKey('4')">4</div><div class="pin-key" onclick="pinKey('5')">5</div><div class="pin-key" onclick="pinKey('6')">6</div>
      <div class="pin-key" onclick="pinKey('7')">7</div><div class="pin-key" onclick="pinKey('8')">8</div><div class="pin-key" onclick="pinKey('9')">9</div>
      <div class="pin-key del" onclick="pinDel()">⌫</div><div class="pin-key" onclick="pinKey('0')">0</div><div class="pin-key ok" onclick="pinSubmit()">✓</div>
    </div>
    <button class="pin-cancel" onclick="hidePinPad()">ยกเลิก</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="load-txt" id="load-txt">กำลังประมวลผล...</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxiPp-xyVNOw6Dm6L9Il3I2b9ynhu02L_VTBmTAXSMh7WHijR-QttRXK6NzBaZUb0k3Nw/exec';

// ============================================================
// STATE
// ============================================================
let gateMode    = 'entry';
let scanMode    = 'camera';
let autoMode    = false;
let stream      = null;
let motionTimer = null;
let prevFrame   = null;
let cooldown    = false;
let cooldownSec = 10;
let sensitivity = 4;      // 1-10 (ยิ่งสูง = ไวมาก = threshold ต่ำ)
let pinBuffer   = '';
let countdownT  = null;
let sessionLogs = [];
let guardInfo   = { username:'guard1', role:'guard' };
let wakeLock    = null;
let isScanning  = false;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  try {
    const s = JSON.parse(sessionStorage.getItem('aivsg_user') || '{}');
    if (s.username) { guardInfo = s; document.getElementById('guard-name').textContent = s.username; }
  } catch(e){}
  startCamera();
  updateClock();
  setInterval(updateClock, 1000);
});

function updateClock(){
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>v.toString().padStart(2,'0')).join(':');
}

// ============================================================
// CAMERA
// ============================================================
async function startCamera(){
  setCamStatus('กำลังเปิดกล้อง...', 'off');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    document.getElementById('video').srcObject = stream;
    setCamStatus('กล้องพร้อม', 'live');
  } catch(e){
    setCamStatus('ไม่พบกล้อง — ใช้อัปโหลด', 'off');
    document.getElementById('btn-capture').disabled = true;
  }
}

function setCamStatus(text, state){
  document.getElementById('cam-status').textContent = text;
  const dot = document.getElementById('cam-dot');
  dot.className = 'cam-dot' + (state === 'live' ? ' live' : state === 'scanning' ? ' scanning' : '');
}

// ============================================================
// AUTO-SCAN TOGGLE
// ============================================================
function toggleAuto(){
  autoMode = !autoMode;
  const sw = document.getElementById('auto-toggle');
  const badge = document.getElementById('auto-badge');
  const sensRow = document.getElementById('sens-row');
  sw.classList.toggle('on', autoMode);
  badge.className = 'auto-status ' + (autoMode ? 'on' : 'off');
  badge.textContent = autoMode ? '🤖 AUTO ON' : 'AUTO OFF';
  sensRow.style.display = autoMode ? 'flex' : 'none';

  if (autoMode){
    startAutoScan();
    acquireWakeLock();
    showToast('🤖 Auto-Scan เปิดแล้ว — จะสแกนทุกครั้งที่เจอรถ');
  } else {
    stopAutoScan();
    releaseWakeLock();
    setCamStatus('กล้องพร้อม', 'live');
    showToast('⏸️ Auto-Scan ปิดแล้ว');
  }
}

function updateSens(v){ sensitivity = parseInt(v); document.getElementById('sens-val').textContent = v; }
function updateCooldown(v){ cooldownSec = parseInt(v); document.getElementById('cooldown-val').textContent = v+'s'; }

// ============================================================
// MOTION DETECTION LOOP
// ============================================================
function startAutoScan(){
  stopAutoScan();
  prevFrame = null;
  motionTimer = setInterval(motionCheck, 500); // ตรวจทุก 0.5 วิ
}

function stopAutoScan(){
  if (motionTimer){ clearInterval(motionTimer); motionTimer = null; }
  document.getElementById('motion-fill').style.width = '0%';
  document.getElementById('motion-pct').textContent = '0%';
}

function motionCheck(){
  if (cooldown || isScanning) return;
  const video = document.getElementById('video');
  if (!video.videoWidth) return;

  const mc = document.getElementById('canvas-motion');
  const W = 160, H = 90; // low-res สำหรับ motion detection
  mc.width = W; mc.height = H;
  const ctx = mc.getContext('2d');
  ctx.drawImage(video, 0, 0, W, H);
  const cur = ctx.getImageData(0, 0, W, H);

  if (!prevFrame){ prevFrame = cur; return; }

  // เปรียบเทียบ pixel — นับจำนวน pixel ที่เปลี่ยน
  let changed = 0;
  const total = W * H;
  const thresh = 30; // pixel diff threshold
  for (let i = 0; i < cur.data.length; i += 4){
    const dr = Math.abs(cur.data[i]   - prevFrame.data[i]);
    const dg = Math.abs(cur.data[i+1] - prevFrame.data[i+1]);
    const db = Math.abs(cur.data[i+2] - prevFrame.data[i+2]);
    if (dr + dg + db > thresh) changed++;
  }
  prevFrame = cur;

  const motionPct = changed / total; // 0.0 - 1.0
  const display = Math.round(motionPct * 100);
  document.getElementById('motion-fill').style.width = Math.min(display * 3, 100) + '%';
  document.getElementById('motion-pct').textContent = display + '%';

  // threshold ขึ้นกับ sensitivity (1=ต้องการ motion เยอะ, 10=ไวมาก)
  // sensitivity 1 = ต้องการ 15% motion, sensitivity 10 = แค่ 3%
  const triggerThreshold = (16 - sensitivity) / 100;

  if (motionPct >= triggerThreshold){
    setCamStatus('🚗 พบวัตถุ — กำลังสแกน...', 'scanning');
    triggerAutoScan();
  }
}

async function triggerAutoScan(){
  if (isScanning) return;
  isScanning = true;
  cooldown = true;

  // ถ่ายภาพ full resolution
  const b64 = captureFrame();
  setCamStatus('🔍 Gemini กำลังวิเคราะห์...', 'scanning');

  try {
    const prompt = 'อ่านทะเบียนรถในภาพ ตอบแค่ตัวเลขและตัวอักษรบนป้ายทะเบียน เช่น "กษ 1234 ขอนแก่น" ถ้าไม่มีรถหรืออ่านไม่ได้ให้ตอบว่า "NONE"';
    const res = await postAPI('scanImage', { image: b64, prompt });
    const plate = (res.result || '').trim();

    if (!plate || plate === 'NONE' || plate === 'UNREADABLE'){
      setCamStatus('ไม่เจอทะเบียน — รอรถใหม่', 'live');
      // Cooldown สั้นลงถ้าไม่เจอ
      setTimeout(() => { cooldown = false; isScanning = false; setCamStatus('กล้องพร้อม', 'live'); }, 3000);
      return;
    }

    // พบทะเบียน!
    setCamStatus(`✅ พบ: ${plate}`, 'live');
    showToast(`🚗 พบทะเบียน: ${plate}`);
    await checkPlate(plate, b64);
  } catch(e){
    setCamStatus('❌ Error — รอรถใหม่', 'live');
    showToast('❌ ' + e.message);
  }

  // Cooldown ก่อนสแกนใหม่
  setTimeout(() => {
    cooldown = false;
    isScanning = false;
    prevFrame = null; // reset frame เพื่อเทียบใหม่
    if (autoMode) setCamStatus('กล้องพร้อม — รอรถ', 'live');
  }, cooldownSec * 1000);
}

function captureFrame(){
  const video = document.getElementById('video');
  const c = document.getElementById('canvas-hidden');
  c.width = video.videoWidth || 1280;
  c.height = video.videoHeight || 720;
  c.getContext('2d').drawImage(video, 0, 0);
  return c.toDataURL('image/jpeg', 0.85).split(',')[1];
}

async function captureAndScan(){
  const b64 = captureFrame();
  await scanImage(b64);
}

async function uploadScan(input){
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = async e => { await scanImage(e.target.result.split(',')[1]); };
  reader.readAsDataURL(input.files[0]);
}

async function scanImage(b64){
  showLoading('Gemini AI กำลังอ่านทะเบียน...');
  try {
    const prompt = 'อ่านทะเบียนรถในภาพ ตอบแค่ตัวเลขและตัวอักษรบนป้ายทะเบียน เช่น "กษ 1234 ขอนแก่น" ถ้าอ่านไม่ได้ให้ตอบว่า "UNREADABLE"';
    const res = await postAPI('scanImage', { image: b64, prompt });
    hideLoading();
    const plate = (res.result||'').trim();
    if (!plate || plate === 'UNREADABLE'){ showResult_unreadable(b64); return; }
    await checkPlate(plate, b64);
  } catch(e){ hideLoading(); showToast('❌ ' + e.message); }
}

async function checkPlate(plate, b64){
  showLoading('กำลังตรวจสอบฐานข้อมูล...');
  try {
    let res;
    if (gateMode === 'entry'){
      res = await getAPI('checkPlate', { plate });
      hideLoading();
      if (res.found && res.type === 'resident')        showResult_resident(plate, res, b64);
      else if (res.found && res.type === 'expected')    showResult_expected(plate, res, b64);
      else                                              showResult_visitor(plate, res, b64);

      res = await getAPI('checkPlateExit', { plate });

      res.canExit ? showResult_exit(plate, res, b64) : showResult_exit_notfound(plate, b64);
    }

// ============================================================
// API — ใช้ JSONP เพื่อแก้ปัญหา CORS
// ============================================================
function jsonpRequest(url){
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cbName];
      try { document.body.removeChild(script); } catch(e){}
      reject(new Error('JSONP timeout'));
    }, 15000);
    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      try { document.body.removeChild(script); } catch(e){}
      resolve(data);
    };
    script.src = url + '&callback=' + cbName;
    script.onerror = () => { clearTimeout(timer); reject(new Error('JSONP error')); };
    document.body.appendChild(script);
  });
}

async function getAPI(action, params){
  let url = API_URL + '?action=' + action;
  Object.entries(params).forEach(([k,v]) => { url += `&${k}=${encodeURIComponent(v)}`; });
  return jsonpRequest(url);
}

async function postAPI(action, body){
  let url = API_URL + '?action=' + action;
  Object.entries(body).forEach(([k,v]) => { if(v !== undefined && v !== null) url += `&${k}=${encodeURIComponent(v)}`; });
  return jsonpRequest(url);
}

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
</script>
